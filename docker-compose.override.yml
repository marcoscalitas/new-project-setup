# ============================================
# Docker Compose — Development Override
# ============================================
# Auto-loaded by Docker Compose in development.
# Adds node (Vite HMR) and mailpit services.
# Overrides nginx to allow Vite CSP origins.
#
# This file is NOT used in production.
# ============================================

services:
    nginx:
        volumes:
            - ./docker/nginx/nginx.dev.conf:/etc/nginx/nginx.conf

    node:
        image: node:22-alpine
        container_name: ${PROJECT_NAME}_node
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./src:/var/www
        networks:
            - app_network
        command: sh -c "[ -d node_modules ] && npm run dev -- --host 0.0.0.0 || (npm install && npm run dev -- --host 0.0.0.0)"
        ports:
            - "127.0.0.1:${VITE_PORT:-5173}:5173"
        healthcheck:
            test: [ "CMD-SHELL", "wget -qO- http://localhost:5173/ || exit 1" ]
            interval: 30s
            timeout: 5s
            retries: 5
            start_period: 90s
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 512M
                reservations:
                    cpus: '0.1'
                    memory: 64M

    mailpit:
        image: axllent/mailpit
        container_name: ${PROJECT_NAME}_mailpit
        restart: unless-stopped
        ports:
            - "127.0.0.1:${MAILPIT_PORT:-8025}:8025"
            - "127.0.0.1:1025:1025"
        networks:
            - app_network
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    cpus: '0.25'
                    memory: 64M
                reservations:
                    cpus: '0.05'
                    memory: 16M
