# ============================================
# Docker Compose — Development Override
# ============================================
# Auto-loaded by Docker Compose in development.
# Adds node (Vite HMR) and mailpit services.
# Overrides nginx to allow Vite CSP origins.
#
# This file is NOT used in production.
# ============================================

services:
    app:
        build:
            target: development

    nginx:
        volumes:
            - ./docker/nginx/nginx.dev.conf:/etc/nginx/nginx.conf

    node:
        image: node:22.14.0-alpine
        container_name: ${PROJECT_NAME}-node
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./src:/var/www
        networks:
            - app_network
        command: sh -c "[ -d node_modules ] && npm run dev -- --host 0.0.0.0 || (npm install && npm run dev -- --host 0.0.0.0)"
        ports:
            - "127.0.0.1:${VITE_PORT:-5173}:5173"
        healthcheck:
            test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:5173/@vite/client > /dev/null 2>&1 || exit 1" ]
            interval: 30s
            timeout: 5s
            retries: 5
            start_period: 90s
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 512M
                reservations:
                    cpus: '0.1'
                    memory: 64M

    minio:
        image: minio/minio:RELEASE.2025-09-07T16-13-09Z
        container_name: ${PROJECT_NAME}-minio
        restart: unless-stopped
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minio}
            MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio123}
        volumes:
            - minio_data:/data
        ports:
            - "127.0.0.1:${MINIO_PORT:-9000}:9000"
            - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
        networks:
            - app_network
        healthcheck:
            test: [ "CMD", "mc", "ready", "local" ]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 10s
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 256M
                reservations:
                    cpus: '0.05'
                    memory: 64M

    mailpit:
        image: axllent/mailpit:v1.29.7
        container_name: ${PROJECT_NAME}-mailpit
        restart: unless-stopped
        ports:
            - "127.0.0.1:${MAILPIT_PORT:-8025}:8025"
            - "127.0.0.1:${MAILPIT_SMTP_PORT:-1025}:1025"
        networks:
            - app_network
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    cpus: '0.25'
                    memory: 64M
                reservations:
                    cpus: '0.05'
                    memory: 16M

volumes:
    minio_data:
        driver: local
