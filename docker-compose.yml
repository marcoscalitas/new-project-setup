# ============================================
# Meu Projecto — Docker Compose
# ============================================

services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: meu_projecto_app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./src:/var/www
            - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
        networks:
            - app_network
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    cpus: '1.0'
                    memory: 512M
                reservations:
                    cpus: '0.25'
                    memory: 128M

    nginx:
        image: nginx:alpine
        container_name: meu_projecto_nginx
        restart: unless-stopped
        ports:
            - "${APP_PORT}:80"
        volumes:
            - ./src:/var/www
            - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - app_network
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 128M
                reservations:
                    cpus: '0.1'
                    memory: 32M

    postgres:
        image: postgres:17-alpine
        container_name: meu_projecto_postgres
        restart: unless-stopped
        command: >
            postgres
            -c shared_buffers=128MB
            -c effective_cache_size=256MB
            -c work_mem=4MB
            -c maintenance_work_mem=64MB
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        ports:
            - "127.0.0.1:5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
        networks:
            - app_network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
            interval: 10s
            timeout: 5s
            retries: 5
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    cpus: '1.0'
                    memory: 512M
                reservations:
                    cpus: '0.25'
                    memory: 256M

    redis:
        image: redis:alpine
        container_name: meu_projecto_redis
        restart: unless-stopped
        command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
        ports:
            - "127.0.0.1:6379:6379"
        volumes:
            - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
            - redis_data:/data
        networks:
            - app_network
        healthcheck:
            test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 256M
                reservations:
                    cpus: '0.1'
                    memory: 64M

    queue:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: meu_projecto_queue
        restart: unless-stopped
        working_dir: /var/www
        command: >
            sh -c "while [ ! -f /var/www/artisan ]; do sleep 1; done && php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600"
        volumes:
            - ./src:/var/www
            - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
        networks:
            - app_network
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 256M
                reservations:
                    cpus: '0.1'
                    memory: 64M

    node:
        image: node:22-alpine
        container_name: meu_projecto_node
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./src:/var/www
        networks:
            - app_network
        command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
        ports:
            - "${VITE_PORT:-5173}:5173"
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 512M
                reservations:
                    cpus: '0.1'
                    memory: 64M

    mailpit:
        image: axllent/mailpit
        container_name: meu_projecto_mailpit
        restart: unless-stopped
        ports:
            - "127.0.0.1:${MAILPIT_PORT:-8025}:8025"
            - "127.0.0.1:1025:1025"
        networks:
            - app_network
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    cpus: '0.25'
                    memory: 64M
                reservations:
                    cpus: '0.05'
                    memory: 16M

networks:
    app_network:
        driver: bridge

volumes:
    postgres_data:
    redis_data:
