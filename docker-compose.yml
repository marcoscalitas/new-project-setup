# ============================================
# Meu Projecto — Docker Compose (Base)
# ============================================
# Serviços de infraestrutura (produção).
# Em desenvolvimento, o docker-compose.override.yml
# é carregado automaticamente e adiciona node + mailpit.
# ============================================

services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: meu_projecto_app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./src:/var/www
            - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
        networks:
            - app_network
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        secrets:
            - db_password
            - redis_password
        healthcheck:
            test: ["CMD-SHELL", "php-fpm -t || exit 1"]
            interval: 30s
            timeout: 5s
            retries: 3
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    cpus: '1.0'
                    memory: 512M
                reservations:
                    cpus: '0.25'
                    memory: 128M

    nginx:
        image: nginx:alpine
        container_name: meu_projecto_nginx
        restart: unless-stopped
        ports:
            - "127.0.0.1:${APP_PORT}:80"
        volumes:
            - ./src:/var/www
            - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            app:
                condition: service_healthy
        networks:
            - app_network
        healthcheck:
            test: ["CMD-SHELL", "curl -sf http://localhost/ || exit 1"]
            interval: 30s
            timeout: 5s
            retries: 3
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 128M
                reservations:
                    cpus: '0.1'
                    memory: 32M

    postgres:
        image: postgres:17-alpine
        container_name: meu_projecto_postgres
        restart: unless-stopped
        command: >
            postgres
            -c shared_buffers=128MB
            -c effective_cache_size=256MB
            -c work_mem=4MB
            -c maintenance_work_mem=64MB
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD_FILE: /run/secrets/db_password
        secrets:
            - db_password
        ports:
            - "127.0.0.1:5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./docker/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh
        networks:
            - app_network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
            interval: 10s
            timeout: 5s
            retries: 5
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    cpus: '1.0'
                    memory: 512M
                reservations:
                    cpus: '0.25'
                    memory: 256M

    redis:
        image: redis:alpine
        container_name: meu_projecto_redis
        restart: unless-stopped
        command: ["sh", "-c", "redis-server /usr/local/etc/redis/redis.conf --requirepass $$(cat /run/secrets/redis_password)"]
        secrets:
            - redis_password
        ports:
            - "127.0.0.1:6379:6379"
        volumes:
            - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
            - redis_data:/data
        networks:
            - app_network
        healthcheck:
            test: ["CMD-SHELL", "redis-cli -a $$(cat /run/secrets/redis_password) ping"]
            interval: 10s
            timeout: 5s
            retries: 5
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 256M
                reservations:
                    cpus: '0.1'
                    memory: 64M

    queue:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: meu_projecto_queue
        restart: unless-stopped
        working_dir: /var/www
        command: >
            sh -c "while [ ! -f /var/www/artisan ]; do sleep 1; done && php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600 --max-jobs=1000"
        volumes:
            - ./src:/var/www
            - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
        networks:
            - app_network
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        secrets:
            - db_password
            - redis_password
        healthcheck:
            test: ["CMD-SHELL", "pgrep -f 'queue:work' || exit 1"]
            interval: 30s
            timeout: 5s
            retries: 3
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 256M
                reservations:
                    cpus: '0.1'
                    memory: 64M

    scheduler:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: meu_projecto_scheduler
        restart: unless-stopped
        working_dir: /var/www
        command: >
            sh -c "while [ ! -f /var/www/artisan ]; do sleep 1; done && php artisan schedule:work"
        volumes:
            - ./src:/var/www
            - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
        networks:
            - app_network
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        secrets:
            - db_password
            - redis_password
        healthcheck:
            test: ["CMD-SHELL", "pgrep -f 'schedule:work' || exit 1"]
            interval: 30s
            timeout: 5s
            retries: 3
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 256M
                reservations:
                    cpus: '0.1'
                    memory: 64M

networks:
    app_network:
        name: meu_projecto_network
        driver: bridge

volumes:
    postgres_data:
        name: meu_projecto_postgres_data
    redis_data:
        name: meu_projecto_redis_data

secrets:
    db_password:
        file: ./secrets/db_password
    redis_password:
        file: ./secrets/redis_password
