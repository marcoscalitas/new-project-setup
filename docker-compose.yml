# ============================================
# Docker Compose — Base / Production
# ============================================
# For development, docker-compose.override.yml is
# auto-loaded and adds node + mailpit services.
#
# For production only (no override):
#   docker compose -f docker-compose.yml up -d --build
# ============================================

name: ${PROJECT_NAME}

services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
            target: production
        pull_policy: build
        container_name: ${PROJECT_NAME}_app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./src:/var/www
            - ./docker/php/php.${APP_ENV:-local}.ini:/usr/local/etc/php/conf.d/custom.ini
        dns:
            - 8.8.8.8
            - 1.1.1.1
        networks:
            - app_network
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test: [ "CMD-SHELL", "php-fpm -t || exit 1" ]
            interval: 30s
            timeout: 5s
            retries: 3
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    cpus: '1.0'
                    memory: 512M
                reservations:
                    cpus: '0.25'
                    memory: 128M

    nginx:
        image: nginx:1-alpine
        container_name: ${PROJECT_NAME}_nginx
        restart: unless-stopped
        ports:
            - "127.0.0.1:${APP_PORT}:80"
        volumes:
            - ./src:/var/www
            - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            app:
                condition: service_healthy
        networks:
            - app_network
        healthcheck:
            test: [ "CMD-SHELL", "wget -qO /dev/null http://127.0.0.1/ || exit 1" ]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 30s
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 128M
                reservations:
                    cpus: '0.1'
                    memory: 32M

    postgres:
        image: postgres:17-alpine
        container_name: ${PROJECT_NAME}_postgres
        restart: unless-stopped
        command: >
            postgres -c shared_buffers=128MB -c effective_cache_size=256MB -c work_mem=4MB -c maintenance_work_mem=64MB
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./docker/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh
        networks:
            - app_network
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
            interval: 10s
            timeout: 5s
            retries: 5
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    cpus: '1.0'
                    memory: 512M
                reservations:
                    cpus: '0.25'
                    memory: 256M

    redis:
        image: redis:7-alpine
        container_name: ${PROJECT_NAME}_redis
        restart: unless-stopped
        command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
        ports:
            - "127.0.0.1:6379:6379"
        volumes:
            - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
            - redis_data:/data
        networks:
            - app_network
        healthcheck:
            test: [ "CMD-SHELL", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping" ]
            interval: 10s
            timeout: 5s
            retries: 5
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 256M
                reservations:
                    cpus: '0.1'
                    memory: 64M

    queue:
        image: ${PROJECT_NAME}_app
        container_name: ${PROJECT_NAME}_queue
        restart: unless-stopped
        working_dir: /var/www
        command: >
            sh -c "while [ ! -f /var/www/artisan ]; do sleep 1; done && php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600 --max-jobs=1000"
        volumes:
            - ./src:/var/www
            - ./docker/php/php.${APP_ENV:-local}.ini:/usr/local/etc/php/conf.d/custom.ini
        networks:
            - app_network
        depends_on:
            app:
                condition: service_healthy
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test: [ "CMD-SHELL", "pgrep -f 'queue:work' || exit 1" ]
            interval: 30s
            timeout: 5s
            retries: 3
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 256M
                reservations:
                    cpus: '0.1'
                    memory: 64M

    scheduler:
        image: ${PROJECT_NAME}_app
        container_name: ${PROJECT_NAME}_scheduler
        restart: unless-stopped
        working_dir: /var/www
        command: >
            sh -c "while [ ! -f /var/www/artisan ]; do sleep 1; done && php artisan schedule:work"
        volumes:
            - ./src:/var/www
            - ./docker/php/php.${APP_ENV:-local}.ini:/usr/local/etc/php/conf.d/custom.ini
        networks:
            - app_network
        depends_on:
            app:
                condition: service_healthy
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test: [ "CMD-SHELL", "pgrep -f 'schedule:work' || exit 1" ]
            interval: 30s
            timeout: 5s
            retries: 3
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "3"
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 256M
                reservations:
                    cpus: '0.1'
                    memory: 64M

networks:
    app_network:
        name: ${PROJECT_NAME}_network
        driver: bridge

volumes:
    postgres_data:
        name: ${PROJECT_NAME}_postgres_data
    redis_data:
        name: ${PROJECT_NAME}_redis_data
