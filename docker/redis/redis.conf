# ============================================
# Redis — Configuration
# ============================================

# --- Rede ---
bind 0.0.0.0
port 6379
protected-mode yes
timeout 300
tcp-keepalive 60

# --- Segurança ---
# Password gerida via --requirepass no docker-compose (variável REDIS_PASSWORD)

# --- Memória ---
maxmemory 256mb
maxmemory-policy allkeys-lru

# --- Persistência ---
appendonly yes
appendfsync everysec
appendfilename "app.aof"

# --- Logs ---
loglevel notice
logfile ""

# --- Performance ---
databases 16
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes

# --- Base de dados por função ---
# db0 → cache
# db1 → filas (queues)
# db2 → sessões