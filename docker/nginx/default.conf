# ============================================
# Nginx — Server Configuration
# ============================================

server {
    listen 80;
    server_name localhost;
    root /var/www/public;
    index index.php index.html;

    # --- Logs ---
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # --- Laravel ---
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # --- Rate Limiting (Auth) ---
    location ~* ^/api/auth {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # --- Rate Limiting (API) ---
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # --- PHP-FPM ---
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        # Timeouts
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 60s;
        fastcgi_read_timeout 60s;
    }

    # --- Segurança ---
    # Bloquear acesso a ficheiros ocultos (.env, .git, etc)
    location ~ /\. {
        deny all;
        return 404;
    }

    # Bloquear acesso directo a ficheiros sensíveis
    location ~* \.(env|log|sh|sql|conf)$ {
        deny all;
        return 404;
    }

    # --- Assets estáticos ---
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # --- Bloquear métodos HTTP não necessários ---
    if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|OPTIONS)$) {
        return 405;
    }
}