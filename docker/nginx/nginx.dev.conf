# ============================================
# Nginx — Global Configuration (DEV)
# ============================================

user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    # --- Limitar informações expostas ---
    server_tokens off;

    # --- MIME Types ---
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --- Charset ---
    charset UTF-8;

    # --- Logs ---
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # --- Performance ---
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # --- Gzip ---
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        image/svg+xml;

    # --- CSP por rota: unsafe-eval apenas em /telescope e /horizon (Vue 2 runtime compiler) ---
    map $request_uri $csp_policy {
        ~^/(telescope|horizon)(/|$) "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' http://localhost:*; style-src 'self' 'unsafe-inline' http://localhost:* https://fonts.bunny.net; connect-src 'self' ws://localhost:* wss://localhost:* http://localhost:*; img-src 'self' data:; font-src 'self' data: http://localhost:* https://fonts.bunny.net;";
        default "default-src 'self'; script-src 'self' 'unsafe-inline' http://localhost:*; style-src 'self' 'unsafe-inline' http://localhost:* https://fonts.bunny.net; connect-src 'self' ws://localhost:* wss://localhost:* http://localhost:*; img-src 'self' data:; font-src 'self' data: http://localhost:* https://fonts.bunny.net;";
    }

    # --- Segurança ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy $csp_policy always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    # --- Rate Limiting ---
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # --- Upload ---
    client_max_body_size 12M;

    # --- Virtual Hosts ---
    include /etc/nginx/conf.d/*.conf;
}